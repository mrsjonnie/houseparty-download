name: Generate Triple J House Party RSS Feed

on:
  schedule:
    # Run every Saturday at 06:00 UTC (08:00 CEST / 07:00 CET)
    - cron: '0 6 * * 6'
  workflow_dispatch:   # allow manual runs as well

jobs:
  build:
    runs-on: ubuntu-latest
    # Give the job permission to push to the repo
    permissions:
      contents: write   # needed to push commits

    steps:
      # 1️⃣ Checkout the repo (default persists credentials)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # persist-credentials: true   # default, can be omitted

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install system dependencies (ffmpeg)
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 4️⃣ Install Python dependencies (only requests is needed)
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 5️⃣ Run the feed generator
      - name: Generate feed & MP3s
        run: |
          python generate_feed.py

      # 6️⃣ Configure git for committing back
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 7️⃣ Set remote URL with token so push works
      - name: Set remote URL for push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      # 8️⃣ Commit & push any new/updated files (feed.xml + MP3s)
      - name: Commit changes
        run: |
          git add docs/feed.xml docs/mp3/*.mp3 || true
          if ! git diff --cached --quiet; then
            git commit -m "Update House Party feed & MP3s $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
