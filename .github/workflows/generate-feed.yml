name: Generate Triple J House Party RSS Feed

on:
  schedule:
    - cron: '0 6 * * 6'
         # - cron: '0 6 * * *'   # every day at 06:00 UTC (adjust as you like)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout the repo (with write permission so we can push MP3s back)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install system dependencies (ffmpeg)
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 4️⃣ Install Python dependencies (only requests is needed)
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 5️⃣ Run the feed generator
      - name: Generate feed & MP3s
        run: |
          python generate_feed.py

      # 6️⃣ Configure git for committing back
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 7️⃣ Commit & push any new/updated files (feed.xml + MP3s)
      - name: Commit changes
        run: |
          git add docs/feed.xml docs/mp3/*.mp3 || true
          if ! git diff --cached --quiet; then
            git commit -m "Update House Party feed & MP3s $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
